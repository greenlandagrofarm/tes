<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ULTRABOARD - BRONLY FARM</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            width: 100%;
            overflow: hidden;
            background-color: #ffffff; /* Background Putih */
            font-family: Arial, sans-serif;
        }

        /* Iframe */
        iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: none;
            z-index: 1; /* Di belakang loader dan footer */
        }

        /* Container Loader Utama (Teks Tengah) */
        #loader {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            /* Warna Hijau Tosca, dibuat sedikit transparan agar teks terlihat */
            color: rgba(0, 128, 128, 1.0); 
            text-align: center;
            font-weight: bold;
            font-size: 1.2rem;
            z-index: 3;
            width: 90%; /* Responsif di HP */
            max-width: 400px;
        }

        /* Container Footer (Logo di Bawah) */
        #footer-container {
            position: fixed;
            bottom: 20px; /* Jarak dari bawah layar */
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 4; /* Paling depan */
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px; /* Jarak antara teks dan logo */
        }

        /* Teks "Development by" */
        #footer-text {
            color: #555; /* Warna abu-abu agar tidak terlalu mencolok */
            font-size: 0.8rem; /* Ukuran teks kecil */
            text-transform: uppercase; /* Huruf besar semua */
            letter-spacing: 1px;
            font-weight: 300;
        }

        /* Gambar Logo Greenland */
        #footer-logo {
            max-height: 50px; /* Mengontrol ukuran logo agar kecil */
            max-width: 150px; /* Memastikan logo tidak terlalu lebar */
            object-fit: contain; /* Mempertahankan rasio aspek logo */
        }
    </style>
</head>
<body>
    
    <div id="loader">Memuat Aplikasi Mohon Tunggu...</div>

    <iframe 
        src="https://script.google.com/macros/s/AKfycbw48YhhNvBfrKMS0P0d7-58JrIlZxJ4ZMTogKOv4fEVg0_lSbPW968lRQWHTFujGas/exec" 
        onload="
            // Ketika iframe selesai dimuat, loader dihilangkan
            document.getElementById('loader').style.display='none';
            // Opsi: Jika ingin logo juga hilang setelah dimuat, uncomment baris di bawah
            // document.getElementById('footer-container').style.display='none';
        ">
    </iframe>

    <div id="footer-container">
        <div id="footer-text">Development by</div>
        <img id="footer-logo" src="<a href="https://ibb.co.com/XxFrdXfZ"><img src="https://i.ibb.co.com/XxFrdXfZ/Whats-App-Image-2026-02-06-at-23-29-17.jpg" alt="Whats-App-Image-2026-02-06-at-23-29-17" border="0"></a>" alt="Greenland Bhumiaji Agrofarm Logo">
    </div>

</body>
</html>
